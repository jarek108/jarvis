name: "tiny-gpt20-turbo"
description: "Lowest latency configuration for rapid English interaction."
services:
  - id: "gpt-oss:20b"
    engine: "ollama"
    params:
      num_ctx: 16384  # Reduced for speed in 'tiny' profile

  - id: "faster-whisper-tiny"
    engine: "native"
    params:
      device: "cuda"
      compute_type: "float16"

  - id: "chatterbox-turbo"
    engine: "native"
    params:
      device: "cuda"
