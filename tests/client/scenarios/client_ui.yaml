# Jarvis Client UI Automation Scenarios

ui_startup_state:
  name: "Verify initial UI state on startup."
  timeline:
    - t: 3.0s
      action: assert_system_state
      condition: "no_models_active"
    - t: 3.5s
      action: take_screenshot
      file: "startup_state.jpg"

ui_loadout_activation_latency:
  name: "Verify immediate UI response when activating a loadout."
  timeline:
    - t: 1.0s
      action: select_dropdown
      target: "loadout_opt"
      value: "Speech-to-Speech, light"
    - t: 2.0s 
      action: assert_system_state
      condition: "models_loading"
    - t: 12.5s
      action: take_screenshot
      file: "loadout_loading_state.jpg"

ui_loadout_deactivation:
  name: "Verify immediate UI teardown when selecting NONE loadout."
  timeline:
    - t: 1.0s
      action: select_dropdown
      target: "loadout_opt"
      value: "Speech-to-Speech, light"
    - t: 4.0s
      action: select_dropdown
      target: "loadout_opt"
      value: "NONE"
    - t: 12.0s
      action: assert_system_state
      condition: "no_models_active"
    - t: 12.5s
      action: assert_ui_text
      target: "record_btn"
      contains: "OFFLINE"

ui_loadout_idempotency:
  name: "Verify that selecting loadout is reasonably responsive."
  timeline:
    - t: 1.0s
      action: select_dropdown
      target: "loadout_opt"
      value: "Speech-to-Speech, light"
    - t: 2.0s
      action: assert_system_state
      condition: "all_models_active"
      
ui_loadout_sidempotency_redo:
  name: "Verify that selecting the already active loadout does nothing."
  timeline:
    - t: 1.0s
      action: select_dropdown
      target: "loadout_opt"
      value: "Speech-to-Speech, light"
    - t: 5.0s
      action: assert_system_state
      condition: "all_models_active"
    - t: 6.0s
      action: select_dropdown
      target: "loadout_opt"
      value: "Speech-to-Speech, light"
    - t: 6.1s
      action: assert_system_state
      condition: "all_models_active"

ui_graph_mapping_status:
  name: "Verify Graph nodes update color based on loadout bindings."
  timeline:
    - t: 1.0s
      action: take_screenshot
      file: "graph_unbound_nodes.jpg"
    - t: 1.5s
      action: select_dropdown
      target: "loadout_opt"
      value: "Speech-to-Speech, heavy"
    - t: 7.0s
      action: take_screenshot
      file: "graph_bound_nodes.jpg"

ui_ux_initial_vram_boot:
  name: "Verify spinner active during initial boot scan and stops correctly."
  timeline:
    - t: 15.0s
      action: assert_ux_state
      condition: "spinner_inactive"
    - t: 16.0s
      action: take_screenshot
      file: "boot_finished.jpg"

ui_ux_persistence_maximize_stage1:
  name: "Verify window maximization state capture."
  timeline:
    - t: 1.0s
      action: maximize_window
    - t: 1.5s
      action: assert_ux_state
      condition: "maximized"
    - t: 2.0s
      action: take_screenshot
      file: "stage1_maximized.jpg"

ui_ux_persistence_maximize_stage2:
  name: "Verify window remains maximized after restart."
  timeline:
    - t: 1.0s
      action: assert_ux_state
      condition: "stable_maximized" # Initial restoration check
    - t: 1.1s
      action: take_desktop_screenshot
      file: "stable_1s.jpg"
    - t: 2.0s
      action: assert_ux_state
      condition: "stable_maximized" # Stability check
    - t: 2.1s
      action: take_desktop_screenshot
      file: "stable_2s.jpg"
    - t: 4.0s
      action: assert_ux_state
      condition: "stable_maximized" # Final persistence check
    - t: 4.1s
      action: take_desktop_screenshot
      file: "stable_4s.jpg"

# Legacy / Original Scenarios
ui_loadout_switch_latency:
  name: "Verify UI responsiveness and visual state during loadout transitions."
  timeline:
    - t: 1.0s
      action: select_dropdown
      target: "loadout_opt"
      value: "Speech-to-Speech, light"
    - t: 1.1s
      action: assert_ui_text
      target: "mode_label"
      contains: "TERMINAL"
    - t: 3.0s
      action: take_screenshot
      file: "loadout_transition_3s.jpg"
    - t: 12.0s
      action: assert_system_state
      condition: "all_models_active"
    - t: 12.5s
      action: assert_ui_text
      target: "terminal"
      contains: "LOADOUT APPLIED"
    - t: 13.0s
      action: take_screenshot
      file: "loadout_final_state.jpg"
