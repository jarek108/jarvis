name: "Client UI Automation Fast Check"
description: "Comprehensive verification of UI responsiveness, state synchronization, and visual consistency."

scenario_sources:
  - "client_ui.yaml"

execution:
  - domain: "UI_BOOT"
    scenarios: 
      - ui_startup_state
      - ui_ux_initial_vram_boot

  - domain: "LOADOUT_MGMT"
    scenarios:
      - ui_loadout_activation_latency
      - ui_loadout_deactivation
      - ui_loadout_idempotency

  - domain: "GRAPH_SYNC"
    scenarios:
      - ui_graph_mapping_status

  - domain: "WINDOW_MGMT"
    scenarios:
      - ui_ux_persistence_maximize_stage1
      - ui_ux_persistence_maximize_stage2
