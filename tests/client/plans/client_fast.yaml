name: "Client UI Automation Fast Check"
description: "Comprehensive verification of UI responsiveness, state synchronization, and visual consistency."

execution:
  - domain: "UI_BOOT"
    scenarios: 
      - "client_ui/ui_startup_state"
      - "client_ui/ui_ux_initial_vram_boot"

  - domain: "LOADOUT_MGMT"
    scenarios:
      - "client_ui/ui_loadout*"

  - domain: "GRAPH_SYNC"
    scenarios:
      - "client_ui/ui_graph_mapping_status"

  - domain: "WINDOW_MGMT"
    scenarios:
      - "client_ui/ui_ux_persistence_maximize_*"
