name: "Production Integration Smoke Test"
description: "Verify production pipelines (from system_config) using zero-VRAM stubs."
settings:
  purge_on_entry: true
  purge_on_exit: true

execution:
  - domain: "sts_voice"
    pipeline: "speech_to_speech"
    loadouts: [["native://faster-whisper-tiny", "native://chatterbox-turbo", "ollama://qwen2.5:0.5b"]]
    scenarios: ["core/speech_to_speech"]

  - domain: "hybrid_chat"
    pipeline: "hybrid_chat"
    loadouts: [["native://faster-whisper-tiny", "ollama://qwen2.5:0.5b"]]
    scenarios: ["core/super_whisper_action"]
