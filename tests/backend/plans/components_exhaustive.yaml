name: "Atomic Component Audit"
description: "Verify all model variants for STT, LLM, and TTS in isolation."
settings:
  purge_on_entry: true
  purge_on_exit: true

execution:
  - domain: "stt"
    pipeline: "atomic_stt"
    loadouts:
      - ["native://faster-whisper-tiny"]
      - ["native://faster-whisper-base"]
      - ["native://faster-whisper-large-v3"]
    scenarios: ["core/stt_*_std"]

  - domain: "llm"
    pipeline: "atomic_llm"
    loadouts:
      - ["ollama://qwen2.5:0.5b"]
      - ["ollama://gpt-oss-20b"]
    scenarios: ["core/llm_*"]

  - domain: "tts"
    pipeline: "atomic_tts"
    loadouts:
      - ["native://chatterbox-turbo"]
      - ["native://chatterbox-multilingual"]
    scenarios: ["core/tts_*"]
