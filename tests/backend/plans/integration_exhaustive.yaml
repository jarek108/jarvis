name: "Full System E2E Audit"
description: "Realistic verification of all production pipelines using real models and virtualized hardware."
settings:
  purge_on_entry: true
  purge_on_exit: true

scenario_sources:
  - "core.yaml"
  - "visual.yaml"

execution:
  - domain: "sts_voice"
    pipeline: "speech_to_speech"
    loadouts:
      - ["native://faster-whisper-tiny", "native://chatterbox-turbo", "ollama://qwen2.5:0.5b"]
      - ["native://faster-whisper-base", "native://chatterbox-multilingual", "vllm://QuantTrio/Qwen3-VL-30B-A3B-Instruct-AWQ#stream"]
    scenarios: [speech_to_speech, token_explosion]

  - domain: "hybrid_chat"
    pipeline: "hybrid_chat"
    loadouts:
      - ["native://faster-whisper-tiny", "ollama://qwen2.5:0.5b"]
    scenarios: [super_whisper_action, vlm_bunny]

  - domain: "visual_sentry"
    pipeline: "multimodal_sentry"
    loadouts:
      - ["vllm://Qwen/Qwen2-VL-2B-Instruct#stream", "native://faster-whisper-tiny"]
    scenarios: [vlm_jarvis_logo]
