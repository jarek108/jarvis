id: memory_verification
description: "Pipeline for verifying ConversationMemory node and FileReader functionality."

nodes:
  - id: input_history
    type: source
    role: file_reader
    capabilities: [text_out]
    path: "tests/data/sample_history.txt"

  - id: input_instruction
    type: source
    role: file_reader
    capabilities: [text_out]

  - id: proc_memory
    type: processing
    role: memory
    capabilities: [text_in, text_out]
    path: "memory_check.txt" # Relative to session_dir
    inputs:
      - input_history
      - input_instruction

  - id: proc_llm
    type: processing
    role: llm
    capabilities: [text_in, text_out]
    inputs: 
      - proc_memory
    context_layout: |
      [CONVERSATION_HISTORY]
      {{ proc_memory }}
      
      [CURRENT_INSTRUCTION]
      {{ input_instruction }}

  - id: output_ui
    type: sink
    role: chat_box
    capabilities: [text_in]
    inputs:
      - proc_llm
