id: memory_verification
description: "Verify State-as-I/O memory persistence."
nodes:
  - id: history_file
    type: source
    role: memory
    path: "tests/data/test_history.txt"

  - id: input_instruction
    type: source
    role: chat_box
    capabilities: [text_out]

  - id: proc_llm
    type: processing
    role: llm
    capabilities: [text_in, text_out]
    inputs:
      - history_file
      - input_instruction
    context_layout: |
      OLD_HISTORY:
      {{ history_file }}

      NEW_QUERY:
      {{ input_instruction }}


