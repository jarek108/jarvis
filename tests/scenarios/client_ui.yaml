# Jarvis Client UI Automation Scenarios

ui_startup_state:
  name: "Verify initial UI state on startup."
  timeline:
    - t: 1.1s
      action: assert_system_state
      condition: "no_models_active"
    - t: 1.5s
      action: take_screenshot
      file: "startup_state.jpg"

ui_loadout_activation_latency:
  name: "Verify immediate UI response when activating a loadout."
  timeline:
    - t: 1.0s
      action: select_dropdown
      target: "loadout_opt"
      value: "Speech-to-Speech, light"
    # Check almost instantly (0.1s later)
    - t: 1.1s 
      action: assert_system_state
      condition: "models_loading"
    - t: 1.2s
      action: take_screenshot
      file: "loadout_loading_state.jpg"

ui_loadout_deactivation:
  name: "Verify immediate UI teardown when selecting NONE loadout."
  timeline:
    - t: 1.0s
      action: select_dropdown
      target: "loadout_opt"
      value: "Speech-to-Speech, light"
    - t: 4.0s
      action: select_dropdown
      target: "loadout_opt"
      value: "NONE"
    - t: 4.1s
      action: assert_system_state
      condition: "no_models_active"
    - t: 4.2s
      action: assert_ui_text
      target: "record_btn"
      contains: "OFFLINE"

ui_loadout_idempotency:
  name: "Verify that selecting the already active loadout does nothing."
  timeline:
    - t: 1.0s
      action: select_dropdown
      target: "loadout_opt"
      value: "Speech-to-Speech, light"
    - t: 8.0s
      action: assert_system_state
      condition: "all_models_active"
    - t: 8.5s
      action: select_dropdown
      target: "loadout_opt"
      value: "Speech-to-Speech, light"
    - t: 8.6s
      action: assert_system_state
      condition: "all_models_active"

ui_graph_mapping_status:
  name: "Verify Graph nodes update color based on loadout bindings."
  timeline:
    - t: 1.0s
      action: take_screenshot
      file: "graph_unbound_nodes.jpg"
    - t: 1.5s
      action: select_dropdown
      target: "loadout_opt"
      value: "Speech-to-Speech, heavy"
    - t: 7.0s
      action: take_screenshot
      file: "graph_bound_nodes.jpg"

# Legacy / Original Scenarios
ui_loadout_switch_latency:
  name: "Verify UI responsiveness and visual state during loadout transitions."
  timeline:
    - t: 1.0s
      action: select_dropdown
      target: "loadout_opt"
      value: "Speech-to-Speech, light"
    - t: 1.1s
      action: assert_ui_text
      target: "mode_label"
      contains: "TERMINAL"
    - t: 3.0s
      action: take_screenshot
      file: "loadout_transition_3s.jpg"
    - t: 12.0s
      action: assert_system_state
      condition: "all_models_active"
    - t: 12.5s
      action: assert_ui_text
      target: "terminal"
      contains: "LOADOUT APPLIED"
    - t: 13.0s
      action: take_screenshot
      file: "loadout_final_state.jpg"
