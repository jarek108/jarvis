name: "Atomic LLM Exhaustive Audit"
description: "Performance and quality benchmark across LLM variants."
settings:
  purge_on_entry: true
  purge_on_exit: true
  track_prior_vram: true
execution:
  - domain: "llm"
    pipeline: "atomic_llm"
    loadouts:
      - ["OL_qwen2.5:0.5b"]
      - ["OL_gpt-oss-20b"]
    scenarios: [llm_basic_chat, llm_polish_explicit, llm_short2long, llm_long_story, token_explosion]
