name: "Jarvis Unified Fast Check"
description: "Core capability smoke test using the reactive flow engine."
settings:
  purge_on_entry: true
  purge_on_exit: true
  force_download: true

execution:
  # 1. Pure Transcription (Atomic)
  - domain: "stt"
    pipeline: "atomic_stt"
    loadouts: [["native://faster-whisper-tiny"]]
    scenarios: [stt_polish_std, stt_french_std]

  # 2. Pure Inference (Atomic)
  - domain: "llm"
    pipeline: "atomic_llm"
    loadouts: [["ollama://qwen2.5:0.5b"]]
    scenarios: [llm_basic_chat]

  # 3. Text-to-Speech (Atomic)
  - domain: "tts"
    pipeline: "atomic_tts"
    loadouts: [["native://chatterbox-turbo"]]
    scenarios: [tts_standard]

  # 4. End-to-End Voice (Complex)
  - domain: "sts_voice"
    pipeline: "voice_to_voice"
    loadouts: [["native://faster-whisper-tiny", "native://chatterbox-turbo", "ollama://qwen2.5:0.5b"]]
    scenarios: [sts_voice]

  # 5. Multi-Input (Complex)
  - domain: "hybrid_chat"
    pipeline: "hybrid_chat"
    loadouts: [["native://faster-whisper-tiny", "ollama://qwen2.5:0.5b"]]
    scenarios: [super_whisper_action]
