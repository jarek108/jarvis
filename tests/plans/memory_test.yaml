name: "State-as-I/O Verification Audit"
description: "Verify that the LLM correctly recalls context from a file-based memory node."
settings:
  purge_on_entry: true
  purge_on_exit: true
execution:
  - domain: "memory_check"
    pipeline: "memory_verification"
    loadouts: [["ollama://qwen2.5:0.5b"]]
    scenarios: [memory_recall]
