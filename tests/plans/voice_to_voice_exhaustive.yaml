name: "Voice-to-Voice Exhaustive Audit"
description: "Pipelined latency and stability benchmark."
settings:
  purge_on_entry: true
  purge_on_exit: true
  track_prior_vram: true
execution:
  - domain: "sts_voice"
    pipeline: "voice_to_voice"
    loadouts:
      - ["native://faster-whisper-tiny", "native://chatterbox-turbo", "ollama://qwen2.5:0.5b"]
      - ["native://faster-whisper-base", "native://chatterbox-multilingual", "ollama://qwen2.5:0.5b"]
      - ["native://faster-whisper-base", "native://chatterbox-multilingual", "vllm://QuantTrio/Qwen3-VL-30B-A3B-Instruct-AWQ#stream"]
    scenarios: [sts_voice, token_explosion]
