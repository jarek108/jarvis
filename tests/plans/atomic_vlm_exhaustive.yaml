name: "Atomic VLM Exhaustive Audit"
description: "Comprehensive benchmark of VLM variants and multi-image context."
settings:
  purge_on_entry: true
  purge_on_exit: true
  track_prior_vram: true
execution:
  - domain: "vlm"
    pipeline: "atomic_vlm"
    loadouts:
      - ["vllm://Qwen/Qwen2-VL-2B-Instruct#stream"]
      - ["vllm://QuantTrio/Qwen3-VL-30B-A3B-Instruct-AWQ#stream"]
    scenarios: [vlm_jarvis_logo, vlm_bunny]
