name: "Atomic STT Exhaustive Audit"
description: "Comprehensive benchmark of all STT model variants."
settings:
  purge_on_entry: true
  purge_on_exit: true
  track_prior_vram: true
execution:
  - domain: "stt"
    pipeline: "atomic_stt"
    loadouts:
      - ["native://faster-whisper-tiny"]
      - ["native://faster-whisper-base"]
    scenarios: [stt_polish_std, stt_french_std, stt_chinese_std, stt_english_std, null_audio]
