name: "Atomic vLLM Exhaustive Audit"
description: "In-depth benchmark of pure text models running via vLLM."
settings:
  purge_on_entry: true
  purge_on_exit: true
  track_prior_vram: true
execution:
  - domain: "vllm"
    pipeline: "atomic_llm"
    loadouts:
      - ["VL_qwen--qwen2.5-0.5b-instruct#stream"]
      - ["VL_quanttrio--qwen3-vl-30b-a3b-instruct-awq#stream"]
    scenarios: [llm_basic_chat, llm_long_story, token_explosion]
