name: "Atomic vLLM Exhaustive Audit"
description: "In-depth benchmark of pure text models running via vLLM."
settings:
  purge_on_entry: true
  purge_on_exit: true
  track_prior_vram: true
execution:
  - domain: "vllm"
    pipeline: "atomic_llm"
    loadouts:
      - ["vllm://Qwen/Qwen2.5-0.5B-Instruct#stream"]
      - ["vllm://QuantTrio/Qwen3-VL-30B-A3B-Instruct-AWQ#stream"]
    scenarios: [llm_basic_chat, llm_long_story, token_explosion]
