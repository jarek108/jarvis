id: multimodal_sentry
description: "Visual analysis with declarative sensors and actuators."
nodes:
  - id: sys_prompt
    display_name: "📄 SYS PROMPT"
    type: source
    role: file_reader
    capabilities: [text_out]
    path: "pipelines/prompts/sentry_persona.txt"

  - id: input_mic
    display_name: "🎙 MIC"
    type: source
    role: microphone
    capabilities: [audio_out]

  - id: input_desktop
    display_name: "🖥 SCREEN"
    type: source
    role: screen_capture
    capabilities: [image_out]

  - id: proc_stt
    type: processing
    role: stt
    capabilities: [audio_in, text_out]
    inputs: 
      - input_mic

  - id: proc_vlm
    type: processing
    role: llm
    capabilities: [text_in, image_in, text_out]
    system_prompt: sys_prompt
    inputs: 
      - proc_stt
      - input_desktop
    context_layout: |
      [VISUAL_CONTEXT]
      <image_path>{{ input_desktop }}</image_path>
      
      [USER_QUERY]
      {{ proc_stt }}

  - id: output_notification
    type: sink
    role: system_notification
    capabilities: [text_in]
    inputs:
      - proc_vlm


