id: hybrid_chat
description: "Voice and Text merged context."
nodes:
  - id: input_mic
    display_name: "🎙 MIC"
    type: source
    role: microphone
    capabilities: [audio_out]

  - id: input_text
    display_name: "📄 SCREEN TEXT"
    type: source
    role: selection_buffer
    capabilities: [text_out]

  - id: input_instruction
    display_name: "💬 CHAT BOX"
    type: source
    role: chat_box
    capabilities: [text_out]

  - id: proc_stt
    type: processing
    role: stt
    capabilities: [audio_in, text_out]
    inputs: 
      - input_mic

  - id: proc_llm
    type: processing
    role: llm
    capabilities: [text_in, text_out]
    inputs: 
      - proc_stt
      - input_text
      - input_instruction
    context_layout: |
      CONTEXT FROM SCREEN:
      {{ input_text }}
      
      USER VOICE COMMAND:
      {{ proc_stt }}
      
      ADDITIONAL INSTRUCTIONS:
      {{ input_instruction }}

  - id: output_ui
    type: sink
    role: chat_box
    capabilities: [text_in]
    inputs:
      - proc_llm


