id: voice_to_voice
description: "Reactive Speech-to-Speech interaction loop."
nodes:
  - id: sys_prompt
    type: source
    role: file_reader
    capabilities: [text_out]
    path: "prompts/sts_persona.txt"

  - id: input_mic
    type: source
    role: microphone
    capabilities: [audio_out]

  - id: proc_stt
    type: processing
    role: stt
    capabilities: [audio_in, text_out]
    inputs: 
      - input_mic

  - id: conversation_memory
    type: utility
    role: memory
    path: "buffers/voice_session.txt"
    inputs:
      - proc_stt

  - id: proc_llm
    type: processing
    role: llm
    capabilities: [text_in, text_out]
    system_prompt: sys_prompt
    output_streaming: true
    inputs: 
      - proc_stt
      - conversation_memory
    context_layout: |
      CONVERSATION HISTORY:
      {{ conversation_memory }}

      CURRENT USER QUERY:
      {{ proc_stt }}

  - id: logic_chunker
    type: processing
    role: utility
    operation: chunk_by_delimiter
    delimiters: ".?!"
    inputs:
      - proc_llm

  - id: proc_tts
    type: processing
    role: tts
    capabilities: [text_in, audio_out]
    inputs: 
      - logic_chunker

  - id: output_speaker
    type: sink
    role: audio_playback
    capabilities: [audio_in]
    inputs:
      - proc_tts
